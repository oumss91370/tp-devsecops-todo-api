# Déploiement de l'API Todo depuis l'image publiée sur DockerHub.
# Avant de lancer : remplacer VOTRE_USERNAME par votre identifiant DockerHub,
# puis exécuter :  docker compose up -d
#
# (La clé "version:" est volontairement omise : elle est obsolète avec Docker Compose v2.)

services:
  todo-api:
    image: VOTRE_USERNAME/todo-api:latest   # image tirée depuis DockerHub
    container_name: todo-api
    ports:
      - "80:5000"                # http://localhost/todos   (port hôte 80 -> 5000 du conteneur)
    environment:
      - DB_PATH=/data/todos.db   # la base est placée dans le volume monté
    volumes:
      - ./data:/data             # persistance de la base SQLite sur l'hôte (dossier, pas un fichier)
    restart: unless-stopped      # redémarre le conteneur sauf arrêt manuel
